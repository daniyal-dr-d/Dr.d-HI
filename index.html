<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. D's Education Hub</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; text-align: center; color: #333; margin: 0; padding: 20px; }
        #game-container { max-width: 600px; margin: 20px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .lives-display { font-size: 28px; color: #e74c3c; margin-bottom: 20px; font-weight: bold; }
        .question-text { font-size: 22px; font-weight: bold; margin-bottom: 10px; min-height: 50px; }
        #hint-text { font-size: 14px; color: #3498db; margin-bottom: 20px; font-style: italic; min-height: 20px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        button { 
            padding: 15px; 
            font-size: 18px; 
            cursor: pointer; 
            border: 2px solid #3498db; 
            background: white; 
            border-radius: 12px; 
            transition: all 0.2s ease;
            font-weight: 600;
        }
        
        button:hover { background: #3498db; color: white; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3); }
        button:active { transform: translateY(0); }

        #dr-d-img { width: 180px; margin-top: 25px; transition: all 0.3s ease; }
        #feedback { margin-top: 15px; font-size: 18px; font-weight: bold; height: 25px; }
        .professor-zone { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="lives-display">Lives: <span id="lives-count">❤️ ❤️</span></div>
        
        <div id="quiz-area">
            <div class="question-text" id="q-text">Loading...</div>
            <div id="hint-text"></div>
            <div class="options-grid" id="opt-container"></div>
            <div id="feedback"></div>
        </div>

        <div class="professor-zone">
            <img id="dr-d-img" src="drd_professor.png" alt="Dr. D">
            <p id="dr-d-speech" style="font-style: italic; color: #555;">"Let's see if you're ready for middle school!"</p>
        </div>
    </div>

    <script>
        let lives = 2;
        let currentIdx = 0;

        // UPDATED EXAM DATA - Q3 is now simpler!
        const examData = [
            { q: "12 + 8 ÷ 2 - 3 = ?", hint: "Tip: Divide 8 by 2 first!", opts: ["7", "10", "15", "13"], a: "13" },
            { q: "What is 25% of $40?", hint: "Tip: 25% is the same as 1/4 of the total.", opts: ["$5", "$10", "$15", "$20"], a: "$10" },
            { q: "What is the AREA of a 5cm square?", hint: "Tip: Multiply side × side (5 × 5).", opts: ["10cm²", "20cm²", "25cm²", "50cm²"], a: "25cm²" },
            { q: "Solve for x: 3x = 18", hint: "Tip: What number times 3 equals 18?", opts: ["3", "6", "9", "15"], a: "6" },
            { q: "Which force pulls objects toward Earth?", hint: "Tip: It's why things fall down!", opts: ["Magnetism", "Friction", "Gravity", "Wind"], a: "Gravity" }
        ];

        function init() {
            if (lives <= 0) {
                document.getElementById("quiz-area").innerHTML = "<h2 style='color:#e74c3c;'>💀 EXAM FAILED</h2><p>Dr. D: 'Study the basics and try again!'</p><button onclick='location.reload()' style='background:#e74c3c; color:white;'>Restart</button>";
                document.getElementById("dr-d-img").src = "drd_open_mouth.png"; 
                return;
            }

            if (currentIdx >= examData.length) {
                document.getElementById("quiz-area").innerHTML = "<h2 style='color:#27ae60;'>🏆 ADMITTED!</h2><p>Dr. D: 'Welcome to Middle School!'</p><button onclick='location.reload()' style='background:#27ae60; color:white;'>Play Again</button>";
                document.getElementById("dr-d-img").src = "drd_professor.png";
                return;
            }

            const data = examData[currentIdx];
            document.getElementById("q-text").innerText = data.q;
            document.getElementById("hint-text").innerText = data.hint;
            const container = document.getElementById("opt-container");
            container.innerHTML = "";
            
            document.getElementById("dr-d-img").src = "drd_professor.png";
            document.getElementById("feedback").innerText = "";

            data.opts.forEach(opt => {
                const btn = document.createElement("button");
                btn.innerText = opt;
                btn.onclick = () => check(opt);
                container.appendChild(btn);
            });
        }

        function check(choice) {
            const feedbackEl = document.getElementById("feedback");
            
            if (choice === examData[currentIdx].a) {
                feedbackEl.innerText = "Correct! Well done.";
                feedbackEl.style.color = "#27ae60";
                document.getElementById("dr-d-img").src = "drd_professor.png";
            } else {
                lives--;
                document.getElementById("lives-count").innerText = "❤️ ".repeat(lives) || "💀";
                feedbackEl.innerText = "Incorrect! Keep going...";
                feedbackEl.style.color = "#e74c3c";
                document.getElementById("dr-d-img").src = "drd_open_mouth.png";
            }

            currentIdx++;
            setTimeout(init, 1000);
        }

        init();
    </script>
</body>
</html>
